<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="orb skin — ready">
  <defs>
    <radialGradient id="orbFace" cx="35%" cy="32%" r="78%">
      <stop offset="0%" stop-color="#bff0c4"/>
      <stop offset="55%" stop-color="#32d74b"/>
      <stop offset="100%" stop-color="#1f7d2e"/>
    </radialGradient>
    <radialGradient id="orbGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#32d74b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#32d74b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="50" cy="50" r="46" fill="url(#orbGlow)">
    <animate attributeName="r" values="40;48;40" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="50" cy="50" r="30" fill="url(#orbFace)" stroke="#000000" stroke-opacity="0.28"/>
  <ellipse cx="50" cy="36" rx="13" ry="8" fill="#ffffff" opacity="0.5"/>
</svg>
