<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 68 78" width="68" height="78" role="img" aria-label="tamagotchi skin — needs you">
  <g>
    <animateTransform attributeName="transform" attributeType="XML" type="translate"
                      values="0 2; 0 -7; 0 2" dur="0.9s" repeatCount="indefinite"/>
    <!-- body -->
    <rect x="11" y="11" width="46" height="56" rx="19" ry="19"
          fill="#fff0a6" stroke="#b89500" stroke-width="2"/>
    <!-- wide excited eyes -->
    <circle cx="24" cy="35.6" r="5" fill="#2b2b2f"/>
    <circle cx="44" cy="35.6" r="5" fill="#2b2b2f"/>
    <!-- open "ooh!" mouth -->
    <ellipse cx="34" cy="48" rx="3.6" ry="4.9" fill="#2b2b2f"/>
  </g>
</svg>
