<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="busy spinner">
  <circle cx="50" cy="50" r="49" fill="#1a1a1c"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="#ffffff" stroke-opacity="0.12" stroke-width="7"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="#ff453a" stroke-width="7" stroke-linecap="round" stroke-dasharray="132 44">
    <animateTransform attributeName="transform" attributeType="XML" type="rotate"
                      from="0 50 50" to="360 50 50" dur="0.9s" repeatCount="indefinite"/>
  </circle>
</svg>
